# Build private Hugo repo @younitystudios.com and publish 
# generated static site to public repo @www.younitystudios.com
name: Deploy static content to public repo

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
        with:
              persist-credentials: false

      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
      
          printf '%s\n' "${{ secrets.PAGES_DEPLOY_KEY }}" > ~/.ssh/pages-deploy-key
          chmod 600 ~/.ssh/pages-deploy-key
      
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts
      
      - name: Test SSH access
        run: |
          ssh -T git@github.com -i ~/.ssh/pages-deploy-key -o IdentitiesOnly=yes || true
          
      - name: Clone website public repo into ./public
        run: |
          rm -rf public
          GIT_SSH_COMMAND="ssh -i ~/.ssh/pages-deploy-key -o IdentitiesOnly=yes" \
            git clone git@github.com:YounityStudios/www.younitystudios.com.git public


      - name: Clean existing files
        run: |
          find public -mindepth 1 \
            ! -name ".git" \
            ! -path "public/.git/*" \
            -exec rm -rf {} +

      - name: copy static content
        run: |
          rsync -av --exclude='public' --exclude '*.md' --exclude 'index-original.html' * ./public/
          echo -e '**Younity Studios - Independent creative engineering studio**\n\n***Crafting software that matters. Thoughtfully engineered. Purposefully designed.***\n\n[https://www.younitystudios.com/](https://www.younitystudios.com/).' > public/README.md
      - name: Configure Git SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Commit and push generated site
        working-directory: ./public
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add -A
      
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
      
          git commit -m "Deploy website"
      
          GIT_SSH_COMMAND="ssh -i ~/.ssh/pages-deploy-key -o IdentitiesOnly=yes" \
            git push origin main
